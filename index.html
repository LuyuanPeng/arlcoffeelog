<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Tracker</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            align-items: center;
        }
        h1, h2 {
            text-align: center;
            color: #333;
        }
        div, select {
            margin-bottom: 20px;
            text-align: center;
        }
        input, button, select {
            margin: 5px;
            padding: 10px;
            width: 70%;
            max-width: 300px;
            font-size: 18px;
        }
        button {
            background-color: #383306;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #383306;
        }
        .create-user-button {
            background-color: transparent;
            color: #333;
            border: 2px solid #383306;
            padding: 5px;
            font-size: 14px;
            width: 50%; /* Smaller width */
        }
        .create-user-button:hover {
            background-color: #f0f0f0;
        }
        .reset-button {
            background-color: rgb(188, 62, 62);
            color: white;
            border: none;
            cursor: pointer;
            padding: 10px;
            font-size: 18px;
        }
        .reset-button:hover {
            background-color: rgb(188, 62, 62);
        }

        .confirm-button {
            background-color: rgb(188, 62, 62);
            color: white;
            border: none;
            cursor: pointer;
            padding: 10px;
            font-size: 14px;
            width: 30%;
        }
        .confirm-button:hover {
            background-color: rgb(188, 62, 62);
        }
        .payment-button {
            background-color: transparent;
            color: rgb(188, 62, 62);
            border: none;
            cursor: pointer;
            padding: 5px;
            font-size: 14px;
        }
        .payment-button:hover {
            background-color: #f0f0f0;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 600px) {
            input, button, select {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <span style="font-size: 100px;">&#9749</span>
    <h1>ARL Productivity Logger</h1>
    
    <!-- Initial User Selection -->
    <div id="initialUserSelection">
        <!-- <label for="userSelection">Select User:</label> -->
        <select id="userSelection">
            <option value="">--Select a User--</option>
        </select>
        <button onclick="confirmSelection()">Confirm</button>
        <button class="create-user-button" onclick="navigate('createUserPage')">Create New User</button>
    </div>

    <!-- Create User Page (Initially Hidden) -->
    <div id="createUserPage" class="hidden">
        <input type="text" id="newUsername" placeholder="New User Name">
        <button onclick="createUser()">Submit</button>
        <button onclick="navigate('initialUserSelection')">Back</button>
    </div>

    <!-- User Actions (Initially Hidden) -->
    <div id="userActions" class="hidden">
        <!-- <h2></h2> -->
        <input type="number" id="cupCount" value="1" min="1" max="100" aria-label="Number of cups to add">
        <button onclick="addCoffee()">Add Cup(s) &#9749;</button>
        <button onclick="checkTotal()">Check Total &#128176;</button>
        <button onclick="showLogs()">My Logs &#128220;</button>
        <button class="reset-button" onclick="prepareReset()">Reset 🗑️</button> <!-- Reset button -->
        <button class="create-user-button" onclick="switchUser()">Not you? Switch user</button>
    </div>

    <!-- Display Total -->
    <div id="totalDisplay"></div>

    <!-- Display Logs Snapshot -->
    <div id="logsDisplay"></div>


    <!-- Reset Confirmation (Initially Hidden) -->
    <div id="resetConfirmation" class="hidden">
        <p id="resetMessage">Please confirm you have paid $<span id="totalAmountDue">0</span> and informed Kee before reset.</p>
        <button class="confirm-button" onclick="confirmReset()">Confirm ✅</button>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import {
            getFirestore, collection, doc, getDoc, getDocs,
            setDoc, updateDoc, addDoc, deleteDoc, increment, serverTimestamp,
            query, orderBy
        } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

        // ---------------------------------------------------------------------
        // TODO: paste the firebaseConfig from your Firebase project here.
        // (Firebase console → Project settings → Your apps → Web app → Config)
        // These values are meant to be public; security is enforced by
        // Firestore rules, not by hiding this config.
        // ---------------------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyAggyIml6uy8-1dlOXtGgFFP_RwLBtbVas",
            authDomain: "arl-coffee-log.firebaseapp.com",
            projectId: "arl-coffee-log",
            storageBucket: "arl-coffee-log.firebasestorage.app",
            messagingSenderId: "302747896257",
            appId: "1:302747896257:web:b55efd5026a6a861fe0740"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const PRICE_PER_CUP = 0.80;

        // Cache the selected user's total locally so "Add Cup" updates instantly
        // (one atomic write per cup, no read round-trip).
        let currentCups = 0;
        // Remember the most recent auto-logged cup so it can be undone.
        let lastLog = null;
        // When a shared-tag tap happens before a user is remembered, log once
        // as soon as they pick their name.
        let pendingTapLog = false;
        const REMEMBER_KEY = 'arlCoffeeUser';

        const esc = s => String(s).replace(/[&<>"]/g,
            c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

        function renderTotal(cups) {
            const amountOwed = (cups * PRICE_PER_CUP).toFixed(2);
            document.getElementById('totalDisplay').innerHTML =
                `Total cups: ${cups} cups. Amount owed: $${amountOwed} ` +
                `<button class="payment-button" onclick="promptPay()">&#128520; Payment Info &#128184;</button>`;
        }

        function setStatus(message) {
            document.getElementById('totalDisplay').textContent = message;
        }

        function userDoc(username) {
            return doc(db, 'users', username);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await fetchUsers();
            handleDeepLink();
        });

        // True only if `name` matches an option in the user dropdown.
        function isKnownUser(name) {
            if (!name) return false;
            const sel = document.getElementById('userSelection');
            const prev = sel.value;
            sel.value = name;
            const ok = sel.value === name;
            if (!ok) sel.value = prev;
            return ok;
        }

        function getRemembered() {
            let name = null;
            try { name = localStorage.getItem(REMEMBER_KEY); } catch (e) {}
            if (name && !isKnownUser(name)) {   // renamed / deleted -> forget
                try { localStorage.removeItem(REMEMBER_KEY); } catch (e) {}
                name = null;
            }
            return name;
        }

        // Deep-link / NFC entry. A shared machine tag encodes  .../arlcoffeelog/?tap=1
        //   ?tap=1  -> log a cup for the remembered user (or ask once, then remember).
        //   ?user=X[&auto=1] -> legacy per-person link (still supported).
        //   plain open with a remembered user -> jump to their screen (no logging).
        async function handleDeepLink() {
            const params = new URLSearchParams(location.search);
            const explicitUser = params.get('user');
            const tap = params.get('tap') === '1';
            const remembered = getRemembered();

            // 1) Legacy per-person link.
            if (explicitUser) {
                if (!isKnownUser(explicitUser)) {
                    document.getElementById('totalDisplay').textContent =
                        `Unknown user “${esc(explicitUser)}”. Please pick your name from the list.`;
                    return;
                }
                document.getElementById('userSelection').value = explicitUser;
                await confirmSelection();
                if (params.get('auto') === '1' || params.get('log') === '1') {
                    const n = parseInt(params.get('cups'), 10) || 1;
                    history.replaceState({}, '', location.pathname + '?user=' + encodeURIComponent(explicitUser));
                    await autoLog(explicitUser, n);
                }
                return;
            }

            // 2) Shared machine tag.
            if (tap) {
                history.replaceState({}, '', location.pathname);  // strip tap so refresh won't re-log
                if (remembered) {
                    document.getElementById('userSelection').value = remembered;
                    await confirmSelection();
                    await autoLog(remembered, 1);
                } else {
                    pendingTapLog = true;   // log once as soon as they pick a name
                    document.getElementById('totalDisplay').textContent =
                        'Pick your name below — we’ll remember you on this phone.';
                }
                return;
            }

            // 3) Plain open, but this phone remembers someone -> jump to their screen (no log).
            if (remembered) {
                document.getElementById('userSelection').value = remembered;
                await confirmSelection();
            }
            // 4) Otherwise: the normal picker (default markup) is already shown.
        }

        function switchUser() {
            try { localStorage.removeItem(REMEMBER_KEY); } catch (e) {}
            lastLog = null;
            pendingTapLog = false;
            document.getElementById('userSelection').value = '';
            document.getElementById('totalDisplay').textContent = '';
            document.getElementById('logsDisplay').textContent = '';
            navigate('initialUserSelection');
        }

        async function autoLog(username, n) {
            try {
                const ref = await addDoc(collection(db, 'users', username, 'logs'),
                                         { ts: Date.now(), count: n });
                await updateDoc(userDoc(username), { cups: increment(n) });
                currentCups += n;
                lastLog = { ref, count: n, username };
                const amountOwed = (currentCups * PRICE_PER_CUP).toFixed(2);
                document.getElementById('totalDisplay').innerHTML =
                    `✅ Logged ${n} cup${n === 1 ? '' : 's'} for <strong>${esc(username)}</strong>. ` +
                    `You owe $${amountOwed}. ` +
                    `<button class="payment-button" onclick="undoLastLog()">Undo</button>`;
            } catch (error) {
                console.error('Auto-log failed:', error);
                document.getElementById('totalDisplay').textContent =
                    'Could not log your cup — please use the Add Cup button.';
            }
        }

        async function undoLastLog() {
            if (!lastLog) return;
            const { ref, count, username } = lastLog;
            lastLog = null;
            try {
                await deleteDoc(ref);
                await updateDoc(userDoc(username), { cups: increment(-count) });
                currentCups = Math.max(0, currentCups - count);
                renderTotal(currentCups);
            } catch (error) {
                console.error('Undo failed:', error);
                document.getElementById('totalDisplay').textContent = 'Could not undo — please check your total.';
            }
        }

        // Function to navigate between pages
        function navigate(page) {
            document.getElementById('initialUserSelection').classList.add('hidden');
            document.getElementById('createUserPage').classList.add('hidden');
            document.getElementById('userActions').classList.add('hidden');
            document.getElementById(page).classList.remove('hidden');
        }

        async function fetchUsers() {
            const userSelect = document.getElementById('userSelection');
            try {
                const snapshot = await getDocs(collection(db, 'users'));
                userSelect.innerHTML = '<option value="">--Select a User--</option>';
                snapshot.forEach(docSnap => {
                    const username = docSnap.data().username || docSnap.id;
                    const option = document.createElement('option');
                    option.value = username;
                    option.textContent = username;
                    userSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error fetching users:', error);
            }
        }

        async function confirmSelection() {
            const username = document.getElementById('userSelection').value;
            if (!username) {
                alert("Please select a user.");
                return;
            }
            // Remember this person on this device for next time.
            try { localStorage.setItem(REMEMBER_KEY, username); } catch (e) {}
            document.getElementById('initialUserSelection').classList.add('hidden');
            document.getElementById('userActions').classList.remove('hidden');
            document.getElementById('logsDisplay').textContent = '';
            document.getElementById('totalDisplay').textContent = '';
            // Preload this user's current total into the local cache.
            try {
                const snap = await getDoc(userDoc(username));
                currentCups = snap.exists() ? (snap.data().cups || 0) : 0;
            } catch (error) {
                console.error('Error loading user total:', error);
                currentCups = 0;
            }
            // If this selection followed a shared-tag tap, log the cup now.
            if (pendingTapLog) {
                pendingTapLog = false;
                await autoLog(username, 1);
            }
        }

        // Create a new user
        async function createUser() {
            const username = document.getElementById('newUsername').value.trim();
            if (!username) {
                alert("Please enter a name.");
                return;
            }
            try {
                const ref = userDoc(username);
                const existing = await getDoc(ref);
                if (existing.exists()) {
                    alert("That user already exists.");
                    return;
                }
                await setDoc(ref, { username, cups: 0, createdAt: serverTimestamp() });
                document.getElementById('newUsername').value = '';
                navigate('initialUserSelection');
                fetchUsers();  // Refresh the user list
            } catch (error) {
                console.error('Error creating user:', error);
                alert('Failed to create user.');
            }
        }

        async function addCoffee() {
            const username = document.getElementById('userSelection').value;
            const coffeeCount = parseInt(document.getElementById('cupCount').value) || 1;
            const button = document.querySelector('#userActions button');
            if (button) button.disabled = true;
            try {
                await updateDoc(userDoc(username), { cups: increment(coffeeCount) });
                // Append a permanent history entry for the "My Logs" snapshot.
                addDoc(collection(db, 'users', username, 'logs'),
                       { ts: Date.now(), count: coffeeCount })
                    .catch(err => console.error('Error writing log entry:', err));
                currentCups += coffeeCount;   // optimistic local update, no extra read
                renderTotal(currentCups);
            } catch (error) {
                console.error('Error logging coffee:', error);
                setStatus('Failed to log — please try again.');
            } finally {
                if (button) button.disabled = false;
            }
        }

        async function checkTotal() {
            const username = document.getElementById('userSelection').value;
            try {
                const snap = await getDoc(userDoc(username));
                currentCups = snap.exists() ? (snap.data().cups || 0) : 0;
                renderTotal(currentCups);
            } catch (error) {
                console.error('Error checking total:', error);
                setStatus('Failed to load total.');
            }
        }

        function promptPay() {
            alert(`PayLah!/PayNow to 81982143. Inform Kee of your payment.`);
        }

        async function showLogs() {
            const username = document.getElementById('userSelection').value;
            const logsDisplay = document.getElementById('logsDisplay');
            logsDisplay.textContent = 'Loading logs…';
            try {
                const q = query(collection(db, 'users', username, 'logs'), orderBy('ts', 'desc'));
                const snap = await getDocs(q);
                if (snap.empty) {
                    logsDisplay.textContent = 'No logs yet.';
                    return;
                }
                let totalCups = 0;
                const items = [];
                snap.forEach(docSnap => {
                    const { ts, count } = docSnap.data();
                    totalCups += count;
                    const when = new Date(ts).toLocaleString();
                    items.push(`<li>${when} — ${count} cup${count === 1 ? '' : 's'}</li>`);
                });
                logsDisplay.innerHTML =
                    `<h2>Log snapshot for ${username}</h2>` +
                    `<p>${snap.size} entries, ${totalCups} cups total (all time)</p>` +
                    `<ul style="text-align:left; max-height:300px; overflow-y:auto; display:inline-block;">` +
                    items.join('') + `</ul>`;
            } catch (error) {
                console.error('Error loading logs:', error);
                logsDisplay.textContent = 'Failed to load logs.';
            }
        }

        async function prepareReset() {
            const username = document.getElementById('userSelection').value;
            try {
                const snap = await getDoc(userDoc(username));
                const total = snap.exists() ? (snap.data().cups || 0) : 0;
                const amountOwed = (total * PRICE_PER_CUP).toFixed(2);
                document.getElementById('totalAmountDue').textContent = amountOwed;
                document.getElementById('resetMessage').textContent =
                    `Please confirm you have paid $${amountOwed} to Kee before reset.`;
                document.getElementById('resetConfirmation').classList.remove('hidden');
                document.getElementById('userActions').classList.add('hidden');
            } catch (error) {
                console.error('Error preparing reset:', error);
            }
        }

        async function confirmReset() {
            const username = document.getElementById('userSelection').value;
            try {
                // Clear the itemized log history (logs represent unpaid cups)...
                const logsSnap = await getDocs(collection(db, 'users', username, 'logs'));
                await Promise.all(logsSnap.docs.map(d => deleteDoc(d.ref)));
                // ...and zero the balance.
                await updateDoc(userDoc(username), { cups: 0 });
                currentCups = 0;
                alert('Data reset successfully.');
                document.getElementById('resetConfirmation').classList.add('hidden');
                document.getElementById('userActions').classList.remove('hidden');
                document.getElementById('totalDisplay').textContent = '';
                document.getElementById('logsDisplay').textContent = '';
            } catch (error) {
                console.error('Error resetting data:', error);
                alert('Failed to reset data.');
            }
        }

        // Expose handlers so the existing inline onclick="" attributes keep working.
        Object.assign(window, {
            navigate, confirmSelection, createUser, addCoffee,
            checkTotal, showLogs, promptPay, prepareReset, confirmReset,
            undoLastLog, switchUser
        });
    </script>
</body>
</html>
